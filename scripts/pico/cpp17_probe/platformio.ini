; Responsibility: PlatformIO project settings for Raspberry Pi Pico C++17 probe firmware.
;
; Notes:
; - This is a bring-up probe, not the future Kibo Script Pico runtime.
; - Arduino framework is used only as a thin harness for USB Serial, timing, and upload.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino

; Switch from ArduinoCore-mbed to Earle Philhower's Arduino-Pico core.
; This is the current best practice for RP2040 + modern GCC + C++17 on PlatformIO.
board_build.core = earlephilhower

; Raspberry Pi Pico Arduino core defaults to an older GNU C++ dialect unless overridden.
build_unflags =
  -std=gnu++11
  -std=gnu++14
build_flags =
  -std=c++17
  -Os

monitor_speed = 115200

; Prefer UF2 drag-and-drop on Windows because `picotool` may not be installed globally.
upload_protocol = picotool
