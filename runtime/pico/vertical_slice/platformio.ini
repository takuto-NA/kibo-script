; 責務: Kibo Script の Pico 向け **runtime vertical slice**（`display#0` + `led#0` + `button#0` 周辺）を PlatformIO でビルドする。
;
; 注意:
; - これは製品 firmware ではなく、host runtime と同じ IR を実機で回すための最小統合である。
; - 依存は原則 `docs/pico-bringup.md` に従い `.pico-work/` へ隔離する（グローバル環境を汚さない）。

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino

board_build.core = earlephilhower

build_unflags =
  -std=gnu++11
  -std=gnu++14
  -fno-exceptions

build_flags =
  -std=c++17
  -Os
  -fexceptions
  -Iinclude
  -I../../cpp/include
  -I../../cpp/vendor

build_src_filter =
  +<*>

lib_deps =
  adafruit/Adafruit SSD1306@^2.5.12
  adafruit/Adafruit GFX Library@^1.11.11

monitor_speed = 115200
upload_protocol = picotool
